<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style/standard.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/json.js"></script>
    <title>Bestell-App</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/Logo 02.png" />
  </head>
  <body onload="init()">
    <section class="wrapper">
      <header>
        <img class="logo" src="./assets/icons/Logo 01.png" alt="bestell-logo" />
        <img class="menu-logo" src="./assets/icons/menu.png" alt="menu-icon" />
      </header>
      <main>
        <section class="hero">
          <img class="hero-img" src="./assets/img/hero.jpg" alt="hero-img" />
          <img
            class="round-img"
            src="./assets/img/round-img.jpg"
            alt="round-img"
          />
          <div class="title">
            <h1><span>Thai</span>Kitchen</h1>
            <div class="rating">
              <p>
                <img src="./assets/icons/star.png" alt="star-icon" /> 4,8
                <span>(2468)</span>
              </p>
            </div>
          </div>
          <p>Thai-ing up your hunger with the best flavors.</p>
        </section>
        <section class="main-content">
          <section id="dish-wrapper"></section>
          <section id="basket-wrapper"></section>
        </section>
      </main>
    </section>
  </body>
</html>
