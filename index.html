<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style/standard.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./style/responsive.css" />
    <script src="script.js" defer></script>
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/json.js"></script>
    <title>Bestell-App</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/Logo 02.png" />
  </head>
  <body onload="init()">
    <header>
      <img class="logo" src="./assets/icons/Logo 01.png" alt="bestell-logo" />
      <img class="menu-logo" src="./assets/icons/menu.png" alt="menu-icon" />
    </header>
    <section class="wrapper">
      <main>
        <section class="hero">
          <img class="hero-img" src="./assets/img/hero.jpg" alt="hero-img" />
          <img
            class="round-img"
            src="./assets/img/round-img.jpg"
            alt="round-img"
          />
          <div class="title">
            <h1><span>Thai</span>Kitchen</h1>
            <div class="rating">
              <p>
                <img src="./assets/icons/star.png" alt="star-icon" /> 4,8
                <span>(2468)</span>
              </p>
            </div>
          </div>
          <p>Thai-ing up your hunger with the best flavors.</p>
        </section>
        <section class="main-content">
          <section id="dish-wrapper"></section>
          <div
            id="basket-overlay"
            onclick="toggleModal('basket-wrapper', false)"
          ></div>
          <section id="basket-wrapper"></section>
        </section>
        <div class="overlay hidden">
          <div class="modal hidden">
            <button class="close-modal">&times;</button>
            <img class="bus-img" src="./assets/img/Bus-img.png" alt="bus-img" />
            <h3>Order confirmed!</h3>
            <p>Your food is on the way!</p>
          </div>

      </main>
    </section>
    <footer>
      <p>© 2026 ThaiKitchen</p>
      <p>Imprint</p>
      <p>Cookie Preferences</p>
    </footer>
            <button
          class="hidden big-basket-btn"
          onclick="toggleModal('basket-wrapper', true)"
        >
          Basket
        </button>
  </body>
</html>
